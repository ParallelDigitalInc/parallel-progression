# Deploys the site to GitHub Pages on every push to main.
# Replaces the legacy branch build, which kept failing with opaque errors.
name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/configure-pages@v5
      - uses: actions/upload-pages-artifact@v3
        with:
          path: .
      # The Pages deployment API intermittently returns "Deployment failed,
      # try again later" (roughly every other attempt on 2026-07-06), so give
      # it a second and third try before failing the run.
      - id: deployment
        uses: actions/deploy-pages@v4
        continue-on-error: true
      - id: retry1
        if: steps.deployment.outcome == 'failure'
        uses: actions/deploy-pages@v4
        continue-on-error: true
      - id: retry2
        if: steps.deployment.outcome == 'failure' && steps.retry1.outcome == 'failure'
        uses: actions/deploy-pages@v4
